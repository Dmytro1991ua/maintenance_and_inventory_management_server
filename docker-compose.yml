services:
  postgres:
    image: postgres:16-alpine
    container_name: maintenance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16-alpine
    container_name: maintenance_postgres_test
    restart: unless-stopped
    environment:
      # Disposable, non-secret credentials — intentionally not the real .env
      # values, since .env.test (which references these) is committed to git.
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: maintenance_db_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: maintenance_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  redis_test:
    image: redis:7-alpine
    container_name: maintenance_redis_test
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  postgres_data:
  postgres_test_data:
  redis_data:
